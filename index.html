<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Cartola — Escalação</title>
<link rel="stylesheet" href="styles.css?v=7"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="page1-lineup.jsx"></script>
<script type="text/babel" src="page2-confrontos.jsx"></script>
<script type="text/babel" src="page3-defensive.jsx"></script>
<script type="text/babel" src="page4-conceded.jsx"></script>
<script type="text/babel" src="page5-top5.jsx"></script>

<style>
.loading-screen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100vh; gap: 16px;
  background: var(--bg, #fff);
  color: var(--text-mute, #888);
  font-family: var(--mono, monospace);
  font-size: 13px;
}
.loading-spinner {
  width: 32px; height: 32px; border-radius: 50%;
  border: 3px solid #e0e0e0;
  border-top-color: #22c55e;
  animation: spin .8s linear infinite;
}
.loading-error {
  color: #f87171; text-align: center; max-width: 320px; line-height: 1.5;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const TWEAK_DEFAULTS = { "theme": "light" };

const TABS = [
  { id: 'lineup',     num: '01', label: 'Escalar meu time' },
  { id: 'confrontos', num: '02', label: 'Confrontos' },
  { id: 'defensive',  num: '03', label: 'Defensivas' },
  { id: 'conceded',   num: '04', label: 'Cedida / posição' },
  { id: 'top5',       num: '05', label: 'Top 5 adversários' },
];

function LoadingScreen({ error }) {
  return (
    <div className="loading-screen">
      {error
        ? <div className="loading-error">❌ {error}<br/><br/><small>Acesse o admin e atualize os dados.</small></div>
        : <>
            <div className="loading-spinner"/>
            <span>Carregando dados...</span>
          </>
      }
    </div>
  );
}

function App() {
  const [ready, setReady] = React.useState(window.__CARTOLA_DATA.loaded);
  const [error, setError]  = React.useState(null);
  const [tab, setTab]       = React.useState('lineup');
  const [drillMatch, setDrillMatch] = React.useState(null);
  const [favs, setFavs]     = React.useState(new Set());
  const [tw, setTweak]      = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', tw.theme === 'light' ? 'light' : 'dark');
  }, [tw.theme]);

  React.useEffect(() => {
    if (ready) return;
    window.__CARTOLA_DATA.onReady(() => {
      const D = window.__CARTOLA_DATA;
      if (D.PLAYERS.length === 0 && D.MATCHES.length === 0) {
        setError('Nenhum dado encontrado no repositório.');
      }
      setReady(true);
    });
  }, []);

  const toggleFav = React.useCallback((id) => {
    setFavs(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  }, []);

  const goToDrill = (matchId) => { setDrillMatch(matchId); setTab('defensive'); };

  if (!ready) return <LoadingScreen />;
  if (error)  return <LoadingScreen error={error} />;

  const D = window.__CARTOLA_DATA;

  return (
    <div className="app">
      <header className="masthead">
        <div className="masthead__brand">
          <span className="dot"/>
          <span>Cartola</span>
        </div>
        <div className="masthead__meta">
          <span>Rodada {D.rodadaAtual}</span>
          <span className="masthead__rule hide-sm"/>
          <span className="masthead__rule"/>
          <span style={{color:'var(--accent)'}}>● {D.PLAYERS.length} atletas</span>
        </div>
      </header>

      <nav className="tabnav">
        {TABS.map(t => (
          <button key={t.id}
            className={`tabnav__item ${tab === t.id ? 'is-active' : ''}`}
            onClick={() => setTab(t.id)}
          >
            <span className="tabnav__num">{t.num}/</span>
            <span>{t.label}</span>
          </button>
        ))}
      </nav>

      {tab === 'lineup'     && <PageLineup     favs={favs} toggleFav={toggleFav}/>}
      {tab === 'confrontos' && <PageConfrontos  goToDrill={goToDrill}/>}
      {tab === 'defensive'  && <PageDefensive   initialMatchId={drillMatch}/>}
      {tab === 'conceded'   && <PageConceded/>}
      {tab === 'top5'       && <PageTop5        favs={favs} toggleFav={toggleFav}/>}

      <TweaksPanel>
        <TweakSection label="Aparência"/>
        <TweakRadio label="Tema" value={tw.theme}
          options={['dark','light']}
          onChange={(v) => setTweak('theme', v)}/>
        <TweakSection label="Dados"/>
        <div style={{fontSize:11, color:'rgba(0,0,0,0.5)', lineHeight:1.5}}>
          Rodada {D.rodadaAtual} · {D.PLAYERS.length} atletas · {D.MATCHES.length} jogos
        </div>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
